# User Mutations
mutation CreateUser(
  $email: String!
  $password: String!
  $name: String!
  $role: String!
  $tel: String!
  $imageUrl: String
) @auth(level: PUBLIC) {
  user_insert(
    data: {
      email: $email
      password: $password
      name: $name
      role: $role
      tel: $tel
      imageUrl: $imageUrl
    }
  )
}

mutation UpdateUser(
  $email: String!
  $name: String
  $role: String
  $tel: String
  $imageUrl: String
  $updatedAt: Timestamp
) @auth(level: PUBLIC) {
  user_update(
    key: { email: $email }
    data: {
      name: $name
      role: $role
      tel: $tel
      imageUrl: $imageUrl
      updatedAt: $updatedAt
    }
  )
}

mutation DeleteUser($email: String!) @auth(level: PUBLIC) {
  user_delete(key: { email: $email })
}

