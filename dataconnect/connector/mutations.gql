# Routine Mutations
mutation CreateRoutine(
  $machineId: UUID!
  $title: String!
  $description: String!
) @auth(level: PUBLIC) {
  routine_insert(
    data: { machineId: $machineId, title: $title, description: $description }
  )
}

mutation UpdateRoutine($id: UUID!, $isCheck: Boolean!, $updatedAt: Timestamp)
@auth(level: PUBLIC) {
  routine_update(
    key: { id: $id }
    data: { isCheck: $isCheck, updatedAt: $updatedAt }
  )
}

mutation DeleteRoutine($id: UUID!) @auth(level: PUBLIC) {
  routine_delete(key: { id: $id })
}

