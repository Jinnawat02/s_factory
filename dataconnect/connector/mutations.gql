mutation CreateRequest(
  $userEmail: String!
  $machineId: UUID!
  $description: String!
  $requestDate: Timestamp!
) @auth(level: PUBLIC) {
  request_insert(
    data: {
      user: { email: $userEmail }
      machine: { id: $machineId }
      description: $description
      status: "Pending"
      requestDate: $requestDate
    }
  )
}

mutation InsertUser(
  $email: String!
  $password: String!
  $name: String!
  $role: String!
  $tel: String!
) @auth(level: PUBLIC) {
  user_insert(
    data: {
      email: $email
      password: $password
      name: $name
      role: $role
      tel: $tel
    }
  )
}

mutation InsertMachine(
  $id: UUID!
  $name: String!
  $serialNumber: Int!
  $description: String!
) @auth(level: PUBLIC) {
  machine_insert(
    data: {
      id: $id
      name: $name
      serialNumber: $serialNumber
      description: $description
    }
  )
}
