# Notification Mutations
mutation CreateNotification(
  $mechanicEmail: String!
  $requestId: UUID!
  $title: String!
  $body: String!
) @auth(level: PUBLIC) {
  notification_insert(
    data: {
      mechanicEmail: $mechanicEmail
      requestId: $requestId
      title: $title
      body: $body
    }
  )
}

mutation MarkNotificationRead($id: UUID!) @auth(level: PUBLIC) {
  notification_update(key: { id: $id }, data: { isRead: true })
}

mutation UpdateRequest(
  $id: UUID!
  $mechanicEmail: String
  $requestDate: Timestamp
  $description: String
) @auth(level: PUBLIC) {
  request_update(
    key: { id: $id }
    data: {
      mechanicEmail: $mechanicEmail
      requestDate: $requestDate
      description: $description
    }
  )
}

