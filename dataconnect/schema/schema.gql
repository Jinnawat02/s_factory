type User @table(key: "email") {
  email: String!
  password: String!
  name: String
  role: String
  tel: String
  fcmToken: String
}

type Machine @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  name: String
  serialNumber: Int
  description: String
}

type Item @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  name: String
  quantity: Int
  description: String
}

type Request @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  user: User!
  machine: Machine!
  mechanic: User!
  requestDate: Timestamp!
  description: String
  status: String @default(value: "Pending")
}

type Routine @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  machine: Machine!
  creator: User
  title: String
  description: String
  isCheck: Boolean @default(value: false)
}

type RoutineLog @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  routine: Routine!
  title: String
  isDone: Boolean
}

type MaintainLog @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  title: String
  isDone: Boolean
  machine: Machine!
  mechanic: User
}

type Notification @table(key: "id") {
  id: UUID! @default(expr: "uuidV4()")
  mechanic: User!
  request: Request!
  title: String!
  body: String!
  isRead: Boolean @default(value: false)
  createdAt: Timestamp! @default(expr: "request.time")
}
