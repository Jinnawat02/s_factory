type User @table (key: "email") {
    email: String!
    password: String!
    name: String
    role: String
    tel: String
}

type Machine @table (key: "id") {
    id: UUID! @default(expr: "uuidV4()")
    name: String
    serialNumber: Int
    description: String
}

type Item @table (key: "id") {
    id: UUID! @default(expr: "uuidV4()")
    name: String
    quantity: Int
    description: String
    }

type Request @table (key: "id") {
    id: UUID! @default(expr: "uuidV4()")
    user: User!
    machine: Machine!
    requestDate: Timestamp!
    description: String
    status: String @default(value: "Pending")
}

type Routine @table (key: "id") {
    id: UUID! @default(expr: "uuidV4()")
    title: String
    creator: User!
}

type RoutineLog @table (key: "id") {
    id: UUID! @default(expr: "uuidV4()")
    title: String
    isDone: Boolean
    routine: Routine!
}

type MaintainLog @table (key: "id") {
    id: UUID! @default(expr: "uuidV4()")
    title: String
    isDone: Boolean
    machine: Machine!
}