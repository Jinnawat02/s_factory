
mutation SeedData {
  # Seed Users
  user_upsertMany(data: [
    { email: "admin@example.com", password: "password123", name: "Admin User", role: "admin", tel: "1234567890" }
    { email: "operator@example.com", password: "password123", name: "Operator User", role: "operator", tel: "0987654321" }
  ])

  # Seed Machines
  machine_upsertMany(data: [
    { id: "11111111-1111-4111-8111-111111111111", name: "Conveyor Belt A", serialNumber: 1001, description: "Main line conveyor" }
    { id: "22222222-2222-4222-8222-222222222222", name: "Hydraulic Press X", serialNumber: 1002, description: "Heavy duty press" }
  ])

  # Seed Items
  item_upsertMany(data: [
    { id: "33333333-3333-4333-8333-333333333333", name: "Wrench Set", quantity: 5, description: "Standard metric wrenches" }
    { id: "44444444-4444-4444-8444-444444444444", name: "Lubricant Oil", quantity: 20, description: "Industrial grade oil" }
  ])

  # Seed Requests (linking to User and Machine)
  request_upsertMany(data: [
    { 
      id: "55555555-5555-4555-8555-555555555555", 
      userId: "operator@example.com", 
      machineId: "11111111-1111-4111-8111-111111111111", 
      requestDate: "2023-10-27T10:00:00Z", 
      description: "Belt making improved noise", 
      status: "Pending" 
    }
  ])

  # Seed Routines (linking to Creator/User)
  routine_upsertMany(data: [
    { 
      id: "66666666-6666-4666-8666-666666666666", 
      title: "Daily Inspection", 
      creatorId: "admin@example.com" 
    }
  ])

  # Seed RoutineLogs (linking to Routine)
  routineLog_upsertMany(data: [
    { 
      id: "77777777-7777-4777-8777-777777777777", 
      title: "Morning Check", 
      isDone: true, 
      routineId: "66666666-6666-4666-8666-666666666666" 
    }
  ])

  # Seed MaintainLogs (linking to Machine)
  maintainLog_upsertMany(data: [
    { 
      id: "88888888-8888-4888-8888-888888888888", 
      title: "Oil Change", 
      isDone: false, 
      machineId: "22222222-2222-4222-8222-222222222222" 
    }
  ])
}